<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Compare Homes — Book My Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css">
<link rel="icon" type="image/png" sizes="48x48" href="assets/img/favicon.png">
<link rel="icon" type="image/png" sizes="192x192" href="assets/img/icon-192.png">
<link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#b01627">
</head>
<body>
<div id="hdr"></div>

<section class="listing-top"><div class="wrap">
  <span class="eyebrow">Decide with confidence</span>
  <h1>Compare homes side by side</h1>
  <p style="color:var(--muted);margin-top:6px">Up to three residences, stacked on the details that matter.</p>
</div></section>

<div class="wrap section" style="padding-top:30px">
  <div id="cmpWrap"></div>
</div>

<footer class="footer" id="footer"></footer>
<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/header.js"></script>
<script src="assets/js/footer.js"></script>
<script>
(function(){
const {P,byId,compare,inr}=window.BMH;
const wrap=document.getElementById('cmpWrap');
function render(){
  const ids=compare();const items=ids.map(byId).filter(Boolean);
  if(!items.length){
    wrap.innerHTML=`<div class="empty">
      <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>
      <h3>Nothing to compare yet</h3><p>Add homes using the “Compare” checkbox on any listing.</p>
      <a class="btn btn-primary btn-sm" href="listings.html" style="margin-top:14px">Browse properties</a></div>`;
    return;
  }
  const sz=p=>p.sizeMin?`${p.sizeMin.toLocaleString('en-IN')}–${p.sizeMax.toLocaleString('en-IN')} sq.ft.`:'On request';
  const rows=[
    ['Configurations',p=>p.configShort],
    ['Built-up size',sz],
    ['Possession',p=>p.status||'On request'],
    ['Property type',p=>p.type],
    ['Developer',p=>p.developer.split('(')[0].trim()],
    ['Location',p=>p.location.split(',').slice(0,2).join(', ')||p.city],
    ['Architect',p=>p.architect||'—'],
    ['Towers',p=>p.towers||'—'],
    ['Amenities',p=>(p.amenities||[]).length?p.amenities.length+'+ amenities':'—'],
    ['RERA',p=>p.rera.length?'Verified':'Registered'],
    ['Price',p=>p.price],
  ];
  wrap.innerHTML=`<div style="overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius)">
  <table class="cmp-table"><thead><tr><th></th>${items.map(p=>`<th>
    <a href="project.html?p=${p.slug}"><img src="${p.card||p.hero}" alt="${p.name}"></a>
    <div style="font-family:var(--serif);font-size:1.05rem;margin-top:8px">${p.name}</div>
    <button class="btn btn-ghost btn-sm" data-rm="${p.id}" style="margin-top:6px">Remove</button>
  </th>`).join('')}</tr></thead>
  <tbody>${rows.map(([lbl,fn])=>`<tr><td class="rowlbl">${lbl}</td>${items.map(p=>`<td>${fn(p)}</td>`).join('')}</tr>`).join('')}
  <tr><td class="rowlbl"></td>${items.map(p=>`<td><a class="btn btn-primary btn-sm" href="project.html?p=${p.slug}">View details</a></td>`).join('')}</tr>
  </tbody></table></div>
  ${items.length<3?`<p style="color:var(--muted);margin-top:18px">Add ${3-items.length} more — <a href="listings.html" style="color:var(--brand);font-weight:600">browse properties</a>.</p>`:''}`;
  wrap.querySelectorAll('[data-rm]').forEach(b=>b.addEventListener('click',()=>{window.BMH.toggleCompare(b.dataset.rm);render();}));
}
render();
})();
</script>
</body>
</html>
