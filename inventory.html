<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Live Inventory — available units · Book My Home</title>
<meta name="description" content="Live available units across Tricity — ready-to-move, under-construction and resale apartments with size, facing, price and possession.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<body>
<div id="hdr"></div>

<section class="listing-top">
  <div class="wrap">
    <span class="eyebrow">Available now</span>
    <h1>Live inventory</h1>
    <p style="color:var(--muted);margin-top:8px;max-width:62ch">Actual units currently available across Tricity — ready-to-move, under-construction and resale. Updated by our team. <span id="liveTag"></span></p>
    <div class="cat-toggle" id="invType" style="margin-bottom:10px">
      <button data-ty="residential" class="active">Residential</button>
      <button data-ty="commercial">Commercial</button>
    </div>
    <div class="cat-toggle" id="invTabs">
      <button data-st="" class="active">All</button>
      <button data-st="ready">Ready to Move</button>
      <button data-st="under-construction">Under Construction</button>
      <button data-st="resale">Resale</button>
    </div>
    <div class="toolbar" style="margin-top:16px">
      <div class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--brand)"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
        <input id="invSearch" type="search" placeholder="Search project, sector, BHK…">
      </div>
      <span class="count" style="font-size:.9rem;color:var(--muted)"><b id="invCount">0</b> units</span>
    </div>
  </div>
</section>

<div class="wrap section" style="padding-top:30px">
  <div class="inv-grid-wrap" id="invGrid"></div>
  <div class="empty hide" id="invEmpty">
    <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4"/></svg>
    <h3>No matching units right now</h3><p>Tell us what you're after and we'll source it.</p>
    <a class="btn btn-primary btn-sm" href="https://wa.me/919888268882?text=Hi%20Book%20My%20Home%2C%20I'm%20looking%20for%20a%20specific%20unit" target="_blank" rel="noopener" style="margin-top:14px">Tell us your requirement</a>
  </div>
</div>

<footer class="footer" id="footer"></footer>
<div class="fab">
  <a class="wa" href="https://wa.me/919888268882" target="_blank" rel="noopener" aria-label="WhatsApp"><svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163a11.867 11.867 0 01-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.82 11.82 0 018.413 3.488 11.82 11.82 0 013.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 01-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 001.51 5.26l-.999 3.648 3.743-.927.235.085z"/></svg></a>
  <button class="top" id="toTop" style="display:none" aria-label="Top"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button>
</div>

<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/header.js"></script>
<script src="assets/js/footer.js"></script>
<script src="assets/js/inventory-config.js"></script>
<script src="assets/js/inventory-store.js"></script>
<script src="assets/js/inventory.js"></script>

</html>
