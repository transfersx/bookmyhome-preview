<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Project — Book My Home</title>
<meta name="description" content="Luxury residence details — configurations, floor plans, amenities, specifications and location. RERA-verified on Book My Home.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="assets/css/styles.css">
<link rel="icon" href="assets/img/logo.jpg">
</head>
<body>

<header class="site-header">
  <div class="wrap nav">
    <a class="brand" href="index.html"><img src="assets/img/logo.jpg" alt="Book My Home"></a>
    <nav class="nav-links">
      <a href="listings.html">All Properties</a>
      <a href="listings.html?city=Mohali">Mohali</a>
      <a href="listings.html?type=Penthouses">Luxury</a>
      <a href="index.html#matcher">Find My Home</a>
      <a href="compare.html">Compare</a>
    </nav>
    <div class="nav-actions">
      <a href="shortlist.html" class="icon-btn" aria-label="Shortlist">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.6l-1-1a5.5 5.5 0 00-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 000-7.8z"/></svg>
        <span class="badge" data-shortlist-count style="display:none">0</span>
      </a>
      <button class="burger" id="burger" aria-label="Menu"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
    </div>
  </div>
</header>

<div class="drawer" id="drawer">
  <div class="drawer-bg" data-close></div>
  <div class="drawer-panel">
    <div class="drawer-top"><img src="assets/img/logo.jpg" alt="Book My Home" style="height:34px"><button class="icon-btn" data-close>✕</button></div>
    <a href="listings.html">All Properties</a>
    <a href="listings.html?city=Mohali">Mohali</a>
    <a href="index.html#matcher">Find My Home</a>
    <a href="shortlist.html">My Shortlist</a>
    <a href="compare.html">Compare</a>
    <a href="index.html#contact" class="btn btn-primary" style="margin-top:14px" data-close>Get a Callback</a>
  </div>
</div>

<main id="app">
  <!-- breadcrumb -->
  <div class="wrap" style="padding:16px 20px 0">
    <a href="listings.html" style="font-size:.85rem;color:var(--muted);display:inline-flex;align-items:center;gap:6px">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg> Back to all properties
    </a>
  </div>

  <!-- gallery -->
  <div class="wrap" style="padding-top:16px"><div class="gallery" id="gallery"></div></div>

  <div class="wrap detail-grid">
    <div class="detail-main" id="detailMain"></div>
    <aside class="detail-side">
      <div class="enquire-card" id="enquireCard"></div>
    </aside>
  </div>
</main>

<footer class="footer" id="footer"></footer>

<!-- lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" data-lb-close>✕</button>
  <button class="lb-nav lb-prev" data-lb-prev>‹</button>
  <img id="lbImg" src="" alt="">
  <button class="lb-nav lb-next" data-lb-next>›</button>
</div>

<!-- enquiry modal -->
<div class="modal" id="enqModal">
  <div class="modal-bg" data-enq-close></div>
  <div class="modal-card">
    <button class="modal-close" data-enq-close>✕</button>
    <span class="eyebrow">Express interest</span>
    <h2 style="font-size:1.5rem;margin:8px 0 4px" id="enqTitle">Enquire</h2>
    <p style="color:var(--muted);font-size:.9rem;margin-bottom:18px">Share your details and an advisor will call you back with pricing, availability &amp; a site-visit slot.</p>
    <form id="enqForm" style="display:grid;gap:13px">
      <div class="field-row"><label>Full name</label><input name="name" required placeholder="Your name"></div>
      <div class="field-row"><label>Phone</label><input name="phone" required placeholder="+91" inputmode="tel"></div>
      <div class="field-row"><label>Email</label><input name="email" type="email" placeholder="you@email.com"></div>
      <div class="field-row"><label>I'm interested in</label><select name="config" id="enqConfig"></select></div>
      <label style="display:flex;gap:10px;align-items:center;font-size:.86rem;color:var(--ink-2)"><input type="checkbox" name="visit" style="width:17px;height:17px;accent-color:var(--brand)"> I'd like to schedule a site visit</label>
      <button class="btn btn-primary btn-block" type="submit">Request callback</button>
    </form>
  </div>
</div>

<div class="fab">
  <a class="wa" id="waFab" href="#" target="_blank" rel="noopener" aria-label="WhatsApp">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163a11.867 11.867 0 01-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.82 11.82 0 018.413 3.488 11.82 11.82 0 013.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 01-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 001.51 5.26l-.999 3.648 3.743-.927.235.085z"/></svg>
  </a>
  <button class="top" id="toTop" style="display:none" aria-label="Top"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/footer.js"></script>
<script src="assets/js/project.js"></script>
</body>
</html>
